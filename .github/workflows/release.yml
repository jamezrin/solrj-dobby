name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and unit tests
        run: ./gradlew build

      - name: Integration tests
        run: ./gradlew integrationTest

      - name: Compute new version
        id: version
        run: |
          current=$(grep -oP '(?<=version = ")[\d.]+(?=")' build.gradle.kts)
          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            none)  ;;
          esac

          new="$major.$minor.$patch"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Update version in build.gradle.kts
        if: inputs.bump != 'none'
        run: |
          sed -i 's/version = "${{ steps.version.outputs.current }}"/version = "${{ steps.version.outputs.new }}"/' build.gradle.kts

      - name: Update version in README.md
        if: inputs.bump != 'none'
        run: |
          sed -i 's|<version>${{ steps.version.outputs.current }}</version>|<version>${{ steps.version.outputs.new }}</version>|' README.md

      - name: Apply spotless formatting
        if: inputs.bump != 'none'
        run: ./gradlew spotlessApply

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ inputs.bump }}" != "none" ]; then
            git add build.gradle.kts README.md
            git commit -m "chore(release): bump version to v${{ steps.version.outputs.new }}"
          fi
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags

      - name: Build release JAR
        run: ./gradlew assemble

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --draft \
            --generate-notes \
            --title "v${{ steps.version.outputs.new }}" \
            build/libs/solrj-dobby-${{ steps.version.outputs.new }}.jar
