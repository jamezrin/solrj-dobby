name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.2)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and unit tests
        run: ./gradlew build

      - name: Integration tests
        run: ./gradlew integrationTest

      - name: Decode GPG key into env
        run: |
          decoded=$(echo "$GPG_PRIVATE_KEY_B64" | base64 -d)
          echo "ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF_GPG" >> "$GITHUB_ENV"
          echo "$decoded" >> "$GITHUB_ENV"
          echo "EOF_GPG" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-daemon
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}
